services:
  server:
    build: .
    ports:
      - "3001:3001" # TODO: temp fix/conflicts with Docker
    depends_on:
      - db
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL}

  worker:
    build: .
    depends_on:
      - db
      - redis
    environment:
      - WORKER=1
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL}
    restart: always

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ${POSTGRES_DIR}:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - ${REDIS_DIR}:/data
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ${MINIO_DIR}:/data
    command: server /data --console-address ":9001"